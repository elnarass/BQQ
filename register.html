<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тіркелу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Тіркелу</h1>

<form id="registerForm">
    <input type="text" placeholder="Имя" id="name" required><br><br>
    <input type="email" placeholder="Email" id="email" required><br><br>
    <input type="password" placeholder="Пароль" id="password" required><br><br>

    <select id="role">
        <option value="courier">Курьер</option>
        <option value="client">Клиент</option>
        <option value="admin">Администратор</option>
    </select><br><br>

    <button type="submit">Тіркелу</button>
</form>

<a href="login.html">Аккаунт бар ма? Кіру</a>

<script src="auth.js"></script>

</body>
</html>
